# ==========================================
# PRODUCTION PROFILE - Docker/Render/AWS Deployment
# ==========================================
# This file is loaded when SPRING_PROFILES_ACTIVE=prod

# Logging - show Errors in production for security
logging.level.root=INFO
logging.level.com.seo.project=ERROR

# Thymeleaf - Enable caching for production
spring.thymeleaf.cache=true

# Performance tuning
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/javascript,application/json

# ✅ FIXED: Server timeouts for large uploads/downloads
server.tomcat.connection-timeout=120000
server.tomcat.max-http-form-post-size=1073741824

# ✅ FIXED: WebFlux settings for large streaming
spring.webflux.multipart.max-in-memory-size=10485760