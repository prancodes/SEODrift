# ==========================================
# PRODUCTION PROFILE - Optimized for Cloud Run
# ==========================================
# This file is loaded when SPRING_PROFILES_ACTIVE=prod

# 1. Logging - Balanced for Cloud Logging costs
logging.level.com.seo.project=ERROR
logging.level.org.springframework.security=WARN

# 2. Server & Security (Hardened for HTTPS)
server.forward-headers-strategy=native
server.servlet.session.cookie.secure=true

# 3. Actuator - Monitoring & Health Checks
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true

# 4. Web Performance (Compression)
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/javascript,application/json

# 5. Resource Optimization
spring.web.resources.chain.compressed=true
spring.web.resources.chain.cache=true

# 6. Cold Start & Serverless Optimizations
spring.main.lazy-initialization=true
spring.devtools.restart.enabled=false

# 7. Hikari Connection Pool (Optimized for Serverless Neon DB Scaling)
# Prevent connection leaks and starvation during Cloud Run auto-scaling
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=15000
