<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(title='Video Downloader - Coming Soon', content=~{::section})}">
<body>
<section class="max-w-4xl mx-auto min-h-[60vh] flex flex-col justify-center">
    
    <div class="card-base p-10 md:p-14 text-center">
        
        <div class="inline-flex items-center justify-center p-4 rounded-2xl bg-orange-100 dark:bg-orange-900/30 text-orange-600 dark:text-orange-400 mb-6 relative group cursor-default">
            <i class="ph-fill ph-cone text-5xl group-hover:animate-pulse"></i>
            <div class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full border-2 border-white dark:border-gray-800 animate-bounce"></div>
        </div>

        <h2 class="text-3xl font-bold text-gray-900 dark:text-white mb-3">
            Under Maintenance
        </h2>

        <p class="text-gray-500 dark:text-gray-400 max-w-lg mx-auto mb-10 text-lg leading-relaxed">
            We are currently upgrading the 
            <span class="font-semibold text-gray-800 dark:text-gray-200">Video Downloader</span> 
            engine to improve speed and reliability. This feature will be back shortly with better performance.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            
            <a href="/" class="btn-primary bg-gray-900 hover:bg-black dark:bg-white dark:hover:bg-gray-200 text-white dark:text-gray-900 shadow-xl shadow-gray-200/50 dark:shadow-none px-8 py-3 w-full sm:w-auto">
                <i class="ph-bold ph-house"></i>
                <span>Back to Home</span>
            </a>

            <a href="/tags" class="group flex items-center gap-2 px-6 py-3 font-medium text-gray-600 dark:text-gray-300 hover:text-brand-600 dark:hover:text-brand-400 transition-colors w-full sm:w-auto justify-center">
                <span>Try Tags Generator</span>
                <i class="ph-bold ph-arrow-right group-hover:translate-x-1 transition-transform"></i>
            </a>
            
        </div>
        
        <div class="mt-12 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-gray-50 dark:bg-gray-800/50 border border-gray-100 dark:border-gray-700 text-xs font-medium text-gray-500 dark:text-gray-400">
            <i class="ph-fill ph-bell-ringing text-brand-500"></i>
            Check back in a few days
        </div>

    </div>

</section>
</body>
</html>
