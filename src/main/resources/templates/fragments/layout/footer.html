<footer th:fragment="footer" class="bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 mt-auto py-8 md:py-12 transition-colors duration-300">
    <link rel="stylesheet" th:href="@{/css/components/navbar-styles.css}">
    <div class="container mx-auto px-6">
        <div class="flex flex-col md:flex-row items-center justify-between gap-6 md:gap-8 mb-8 md:mb-10">
            <div class="group flex flex-col items-center md:items-start gap-2 md:gap-3">
                <div
                    class="flex items-center gap-2 md:gap-3 font-black text-lg md:text-2xl text-gray-900 dark:text-white transition-all">
                    <div
                        class="relative w-10 h-10 md:w-12 md:h-12 flex items-center justify-center bg-brand-600 rounded-xl shadow-lg shadow-brand-500/20 overflow-hidden">
                        <div class="smoke-puff absolute w-4 h-4 bg-white/40 rounded-full blur-md opacity-0"></div>
                        <div class="smoke-puff absolute w-3 h-3 bg-white/20 rounded-full blur-lg opacity-0 delay-100"></div>
                        <div class="rocket-node relative z-10">
                            <img th:src="@{/images/navbar-rocket.svg}" alt="Rocket" class="md:w-10 md:h-10">
                        </div>
                    </div>
                    <span class="tracking-tighter">SEODrift</span>
                </div>
            
                <p class="hidden md:block text-xs md:text-sm font-medium text-gray-500 dark:text-gray-400 max-w-[280px] leading-relaxed">
                    A specialized toolkit for modern content strategy, leveraging deep-dive analytics and SEO optimization.
                </p>
            </div>

        <div class="flex flex-col items-center md:items-end gap-3">
                <a href="https://github.com/prancodes/SEODrift" target="_blank" 
                   class="btn-primary group/star py-2.5 px-6 md:px-8 text-[11px] md:text-sm bg-gray-900 dark:bg-white text-white dark:text-gray-900 border-none shadow-2xl hover:scale-105 transition-all flex items-center gap-3">
                    
                    <div class="relative flex items-center justify-center">
                        <i class="ph-fill ph-star text-xl md:text-2xl text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.8)] group-hover/star:rotate-30 transition-transform duration-500"></i>
                        <div class="absolute inset-0 bg-yellow-400 blur-md opacity-40 animate-pulse"></div>
                    </div>

                    <div class="flex flex-col items-start leading-tight">
                        <span class="font-black tracking-widest italic">Found this helpful?</span>
                        <span class="text-[9px] md:text-[12px] font-bold opacity-70 tracking-widest">Give it a star on GitHub!</span>
                    </div>
                    
                </a>

                <div class="text-[9px] md:text-xs font-bold text-gray-400 dark:text-gray-600 uppercase tracking-widest">
                    Built with Spring Boot & Tailwind CSS V4
                </div>
            </div>

        </div>

        <div class="h-px w-full bg-linear-to-r from-transparent via-gray-200 dark:via-gray-800 to-transparent opacity-30 md:opacity-50"></div>

        <div class="mt-6 md:mt-8 flex flex-col items-center gap-3 md:gap-4 text-center">
            <a href="https://github.com/prancodes" target="_blank" class="flex flex-col sm:flex-row items-center gap-1 sm:gap-2 text-[10px] md:text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest hover:text-brand-600 dark:hover:text-brand-400 transition-all group">
                <span class="opacity-80">Developed and maintained by</span> 
                <div class="flex items-center gap-2">
                    <span class="text-gray-900 dark:text-white font-black">Pranjal Singh</span>
                    <i class="ph-fill ph-github-logo text-lg group-hover:rotate-12 transition-transform"></i>
                </div>
            </a>

            <p class="text-[9px] md:text-xs font-medium text-gray-400 dark:text-gray-500 tracking-wide">
                &copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> 
                <span class="font-black text-gray-600 dark:text-gray-400">SEODrift</span>. 
                <span class="hidden sm:inline">All Rights Reserved.</span>
            </p>
        </div>
    </div>
</footer>
