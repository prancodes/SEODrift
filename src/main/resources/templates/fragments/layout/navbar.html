<nav th:fragment="navbar" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" class="sticky top-0 z-50 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 transition-all duration-300">
    <link rel="stylesheet" th:href="@{/css/components/navbar-styles.css}">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Google Identity Services Configuration (Must load before g_id_signin buttons) -->
    <div sec:authorize="isAnonymous()">
        <div id="g_id_onload"
             th:data-client_id="${googleClientId}"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_select="false"
             data-auto_prompt="false"
             data-itp_support="true"
             data-use_fedcm_for_prompt="false">
        </div>
        
        <script>
            function handleCredentialResponse(response) {
                console.log("Google Credential Received. Syncing with backend...");
                
                fetch('/api/auth/google', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]')?.content
                    },
                    body: JSON.stringify({ token: response.credential })
                })
                .then(res => {
                    if (res.ok) {
                        console.log("Authentication successful, reloading...");
                        window.location.reload();
                    } else {
                        console.error('Backend authentication failed');
                    }
                })
                .catch(err => {
                    console.error('Network error during authentication:', err);
                });
            }
        </script>
    </div>

    <div class="container mx-auto px-4 h-16 md:h-20 flex items-center justify-between">
        
        <a href="/" class="group flex items-center gap-2 md:gap-3 font-black text-lg md:text-2xl text-gray-900 dark:text-white hover:opacity-90 transition-all">
            <div class="relative w-10 h-10 md:w-12 md:h-12 flex items-center justify-center bg-brand-600 rounded-xl shadow-lg shadow-brand-500/20 overflow-hidden">
                
                <div class="smoke-puff absolute w-4 h-4 bg-white/40 rounded-full blur-md opacity-0"></div>
                <div class="smoke-puff absolute w-3 h-3 bg-white/20 rounded-full blur-lg opacity-0 delay-100"></div>

                <div class="rocket-node relative z-10">
                    <img th:src="@{/images/navbar-rocket.svg}" alt="Rocket" class="md:w-10 md:h-10">
                </div>
            </div>
            <span class="tracking-tighter hidden sm:inline">SEODrift</span>
        </a>

        <div class="hidden md:flex items-center gap-6 lg:gap-10 text-[13px] lg:text-sm font-black uppercase tracking-widest text-gray-500 dark:text-gray-400">
            <a href="/tags" data-auth="true" class="hover:text-brand-600 dark:hover:text-brand-400 transition-colors relative group/link">
                Tags Generator
                <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-brand-600 transition-all group-hover/link:w-full"></span>
            </a>
            <a href="/thumbnail" data-auth="true" class="hover:text-orange-600 dark:hover:text-orange-400 transition-colors relative group/link">
                Thumbnail Grabber
                <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-orange-600 transition-all group-hover/link:w-full"></span>
            </a>
            <a href="/analytics" data-auth="true" class="hover:text-green-600 dark:hover:text-green-400 transition-colors relative group/link">
                Video Analytics
                <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-green-600 transition-all group-hover/link:w-full"></span>
            </a>
        </div>

        <div class="flex items-center gap-2 md:gap-3">
            <button id="theme-toggle" class="relative p-2.5 md:p-3 rounded-2xl bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400 border border-gray-200 dark:border-gray-700 hover:bg-gray-200 dark:hover:bg-gray-700 hover:text-brand-600 dark:hover:text-brand-400 transition-all duration-300 group">
                <i class="ph-fill ph-moon dark:hidden text-lg md:text-xl"></i>
                <i class="ph-fill ph-sun hidden dark:block text-lg md:text-xl text-yellow-500 group-hover:rotate-90 transition-transform"></i>
            </button>

            <!-- User Auth Profile (Dropdown triggers on click) -->
            <div sec:authorize="isAuthenticated()" class="relative ml-1 md:ml-2">
                <button id="profile-dropdown-btn" class="flex items-center p-0.5 rounded-2xl border-2 border-transparent transition-all active:scale-95 group/profile relative">
                    <div class="relative">
                        <div class="w-9 h-9 md:w-10 md:h-10 rounded-xl overflow-hidden border-2 border-brand-500/20 shadow-sm">
                            <img th:src="${#authentication.principal.attributes['picture'] != null ? #authentication.principal.attributes['picture'] : ('https://ui-avatars.com/api/?name=' + #authentication.principal.attributes['name'] + '&background=6366f1&color=fff')}" 
                                 class="w-full h-full object-cover" 
                                 th:data-fallback-src="'https://ui-avatars.com/api/?name=' + ${#authentication.principal.attributes['name']} + '&background=6366f1&color=fff'"
                                 onerror="this.src=this.getAttribute('data-fallback-src')">
                        </div>
                        <!-- Verified Badge - Always visible and perfectly aligned -->
                        <div class="absolute -bottom-1 -right-1 md:-bottom-0.5 md:-right-0.5 bg-white dark:bg-gray-900 rounded-full w-4 h-4 md:w-5 md:h-5 flex items-center justify-center shadow-md border border-gray-100 dark:border-gray-800 z-10">
                            <i class="ph-fill ph-seal-check text-brand-500 text-[11px] md:text-[14px] leading-none"></i>
                        </div>
                    </div>
                </button>

                <!-- Restored Dropdown Menu (No caret icon on button) -->
                <div id="profile-dropdown-menu" class="hidden profile-dropdown-menu dropdown-animate">
                    <div class="p-4 border-b border-slate-100 dark:border-slate-800/50 bg-slate-50 dark:bg-slate-900">
                        <div class="flex items-center gap-3">
                            <div class="relative w-10 h-10 rounded-xl overflow-hidden border border-brand-500/20 shadow-sm">
                                <img th:src="${#authentication.principal.attributes['picture'] != null ? #authentication.principal.attributes['picture'] : ('https://ui-avatars.com/api/?name=' + #authentication.principal.attributes['name'] + '&background=6366f1&color=fff')}" 
                                     class="w-full h-full object-cover"
                                     th:data-fallback-src="'https://ui-avatars.com/api/?name=' + ${#authentication.principal.attributes['name']} + '&background=6366f1&color=fff'"
                                     onerror="this.src=this.getAttribute('data-fallback-src')">
                            </div>
                            <div class="min-w-0 flex-1">
                                <div class="text-sm font-bold text-slate-800 dark:text-slate-100 truncate flex items-center gap-1.5">
                                    <span th:text="${#authentication.principal.attributes['name']}">User Name</span>
                                    <i class="ph-fill ph-seal-check text-brand-500 text-[12px] shrink-0"></i>
                                </div>
                                <div class="text-[10px] text-slate-400 dark:text-slate-500 truncate" th:text="${#authentication.principal.attributes['email']}">user@gmail.com</div>
                            </div>
                        </div>
                    </div>
                    <div class="p-2 space-y-1">
                        <a href="/dashboard" class="profile-dropdown-link">
                            <i class="ph-bold ph-layout text-base"></i>
                            User Dashboard
                        </a>
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <button type="submit" class="profile-dropdown-logout">
                                <i class="ph-bold ph-power text-base"></i>
                                Sign Out
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Guest Login -->
            <div sec:authorize="isAnonymous()" class="hidden md:block ml-1 md:ml-2">
                <a href="javascript:showLoginModal()" class="inline-flex items-center gap-3 px-5 md:px-6 py-2.5 md:py-3 bg-white dark:bg-gray-800 text-gray-900 dark:text-white hover:bg-gray-50 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-700 rounded-2xl text-[11px] md:text-xs font-black uppercase tracking-widest transition-all active:scale-95 shadow-lg shadow-gray-900/5 group/login">
                    <div class="w-4 h-4">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                    </div>
                    <span>Login</span>
                </a>
            </div>
            
            <button id="mobile-menu-btn" class="md:hidden p-2.5 rounded-2xl bg-brand-50 dark:bg-brand-900/20 text-brand-600 dark:text-brand-400 border border-brand-100 dark:border-brand-800 hover:bg-brand-100 dark:hover:bg-brand-800 active:bg-brand-200 dark:active:bg-brand-700 active:scale-95 transition-all outline-none">
                <i class="ph-bold ph-list text-xl"></i>
            </button>
        </div>
    </div>

    <div id="mobile-menu" class="hidden md:hidden absolute top-full left-0 w-full bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 shadow-xl z-40 animate-fade-in">
        <div class="flex flex-col p-6 gap-6 font-black uppercase tracking-widest text-[13px] text-gray-600 dark:text-gray-400">
            <a href="/tags" data-auth="true" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-brand-50 dark:hover:bg-brand-900/30 hover:text-brand-600 transition-all active:bg-brand-100">
                <i class="ph-bold ph-hash text-lg"></i> Tags Generator
            </a>
            <a href="/thumbnail" data-auth="true" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-orange-50 dark:hover:bg-orange-900/20 hover:text-orange-600 transition-all active:bg-orange-100">
                <i class="ph-bold ph-image text-lg"></i> Thumbnail Grabber
            </a>
            <a href="/analytics" data-auth="true" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-green-50 dark:hover:bg-green-900/20 hover:text-green-600 transition-all active:bg-green-100">
                <i class="ph-bold ph-chart-line-up text-lg"></i> Video Analytics
            </a>
            <div sec:authorize="isAnonymous()" class="p-4">
                <a href="javascript:showLoginModal()" class="flex items-center justify-center gap-3 w-full py-4 bg-white dark:bg-gray-800 text-gray-900 dark:text-white border border-gray-200 dark:border-gray-700 rounded-2xl font-black uppercase tracking-widest text-xs transition-all active:scale-95 shadow-lg">
                    <div class="w-4 h-4">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                    </div>
                    <span>Login with Google</span>
                </a>
            </div>
            <div sec:authorize="isAuthenticated()" class="p-4 border-t border-gray-100 dark:border-gray-800">
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="flex items-center justify-center gap-3 w-full py-4 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-2xl font-black uppercase tracking-widest text-xs transition-all active:scale-95">
                        <i class="ph-bold ph-power text-lg"></i> Sign Out
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>
