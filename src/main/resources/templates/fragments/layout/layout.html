<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    
    <!-- SEO Meta Tags -->
    <meta name="description" th:content="${metaDescription ?: 'Master your YouTube strategy with SEODrift. Generate optimized SEO tags, download high-res thumbnails, audit channel health, and get deep video analytics.'}">
    <meta name="keywords" th:content="${metaKeywords ?: 'youtube seo, youtube tag generator, thumbnail downloader, youtube analytics, channel audit, video seo, seodrift'}">
    <meta name="author" content="Pranjal Singh">
    
    <!-- Canonical Link -->
    <link rel="canonical" th:href="${canonicalUrl ?: ((baseUrl ?: '') + (currentUri ?: ''))}" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" th:content="${canonicalUrl ?: ((baseUrl ?: '') + (currentUri ?: ''))}">
    <meta property="og:title" th:content="${ogTitle ?: 'SEODrift - Master Your YouTube Strategy'}">
    <meta property="og:description" th:content="${metaDescription ?: 'Master your YouTube strategy with SEODrift. Generate optimized SEO tags, download high-res thumbnails, audit channel health, and get deep video analytics.'}">
    <meta property="og:image" th:content="${ogImage ?: ((baseUrl ?: '') + '/images/og-banner.png')}">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" th:content="${canonicalUrl ?: ((baseUrl ?: '') + (currentUri ?: ''))}">
    <meta property="twitter:title" th:content="${ogTitle ?: 'SEODrift - Master Your YouTube Strategy'}">
    <meta property="twitter:description" th:content="${metaDescription ?: 'Master your YouTube strategy with SEODrift. Generate optimized SEO tags, download high-res thumbnails, audit channel health, and get deep video analytics.'}">
    <meta property="twitter:image" th:content="${ogImage ?: ((baseUrl ?: '') + '/images/og-banner.png')}">

    <title layout:title-pattern="$CONTENT_TITLE | $LAYOUT_TITLE">SEODrift</title>
    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg" />
    <link rel="shortcut icon" href="/favicons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="SEODrift" />
    <link rel="manifest" href="/favicons/site.webmanifest" />

    <link rel="stylesheet" th:href="@{/dist/styles.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script th:src="@{/js/core/theme.js}"></script>
    <script th:src="@{/dist/main.js}" defer></script>
    <script th:src="@{/js/components/navbar-script.js}" defer></script>
    <script th:src="@{/js/components/auth-modal.js}" defer></script>

    <link rel="stylesheet" th:href="@{/css/base/layout-styles.css}">

    <!-- CSRF Tokens for AJAX -->
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="0ZkyBHn9B02UrwOr3H2qSbbyqF8I4rDQHm0kJ82s3JU" />
    
</head>

<body th:data-authenticated="${#authentication != null and #authentication.name != null}"
      class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 flex flex-col min-h-screen transition-colors duration-300 selection:bg-brand-500 selection:text-white">

    <div th:replace="~{fragments/layout/navbar :: navbar}"></div>

    <main class="grow container mx-auto px-4 py-8 md:py-12 lg:py-16 animate-fade-in">
        <div layout:fragment="content">
            <!-- Content from child templates will be injected here -->
        </div>
    </main>

    <div th:replace="~{fragments/layout/footer :: footer}"></div>
    
    <!-- Auth Modal - Integrated non-intrusively -->
    <div th:replace="~{fragments/components/login-modal :: login-modal}"></div>
    
</body>
</html>
