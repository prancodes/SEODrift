<div th:fragment="login-modal" id="login-modal"
    class="fixed inset-0 z-[9999] hidden flex items-center justify-center p-6 overflow-hidden"
    aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <link rel="stylesheet" th:href="@{/css/components/auth-modal.css}">

    <!-- Ultra-Refined Backdrop -->
    <div id="modal-backdrop" class="fixed inset-0 opacity-0 cursor-pointer"></div>

    <!-- The Celestial Card -->
    <div id="login-card"
        class="relative w-[340px] max-w-[calc(100vw-48px)] celestial-card shimmer-border opacity-0 transform z-10">
        <!-- Background Mesh Glow -->
        <div class="mesh-glow"></div>

        <!-- Glass Content Layer -->
        <div class="relative p-8 sm:p-10 flex flex-col items-center">

            <!-- Branding Sequence -->
            <div class="brand-orbit mb-6 flex items-center justify-center">
                <div class="relative z-10 bg-white/95 rounded-[20px] p-3 shadow-2xl shadow-blue-500/20">
                    <img th:src="@{/images/navbar-rocket.svg}" alt="Rocket" class="w-8 h-8 object-contain">
                </div>
                <!-- Pulsing Core -->
                <div class="absolute inset-0 bg-blue-500/30 blur-2xl rounded-full animate-pulse"></div>
            </div>

            <!-- Typography -->
            <div class="text-center mb-8">
                <h3 id="modal-title" class="text-3xl font-black text-slate-800 dark:text-white mb-2 tracking-tighter leading-none">
                    SEODrift<span class="text-blue-500">.</span>
                </h3>
                <p class="text-sm text-slate-600 dark:text-slate-400 font-semibold tracking-tight leading-relaxed max-w-[240px] mx-auto">
                    Accelerate your <span class="text-blue-600 dark:text-slate-200">content momentum</span> with precision SEO intelligence.
                </p>
            </div>

            <!-- Authentication Layer -->
            <div class="w-full space-y-6" sec:authorize="isAnonymous()">
                <div class="flex justify-center">
                    <!-- Custom Premium Google Button -->
                    <a th:href="@{/oauth2/authorization/google}" data-turbo="false" class="google-signin-btn group">
                        <div class="google-icon-wrapper">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                            </svg>
                        </div>
                        <span class="text-sm font-bold tracking-tight text-white/90 group-hover:text-white transition-colors">
                            Continue with Google
                        </span>
                        <div class="btn-glow"></div>
                    </a>
                </div>

                <!-- Minimalist Trust Indicator -->
                <div class="flex flex-col items-center gap-4">
                    <div class="h-[1px] w-10 bg-gradient-to-r from-transparent via-slate-300 dark:via-slate-700 to-transparent"></div>

                    <div class="flex items-center gap-2.5 px-4 py-2 bg-blue-50/70 dark:bg-white/5 rounded-xl border border-blue-100/80 dark:border-white/5">
                        <i class="ph-fill ph-shield-check text-blue-500 text-base"></i>
                        <span class="text-[9px] font-black uppercase tracking-[0.2em] text-blue-700/80 dark:text-slate-400">
                            Verified Creator Workspace
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
