<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(title='Thumbnail Downloader', content=~{::section})}">
<body>
<section class="max-w-4xl mx-auto">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-8">
        <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
            <i class="ph-fill ph-image text-orange-500"></i> Thumbnail Downloader
        </h2>

        <form class="flex gap-4 mb-8">
            <input type="text" placeholder="https://www.youtube.com/watch?v=..." 
                   class="flex-1 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-xl px-5 py-3 focus:ring-2 focus:ring-orange-500 focus:outline-none transition">
            <button type="submit" class="bg-orange-500 hover:bg-orange-600 text-white font-medium px-8 py-3 rounded-xl shadow-lg shadow-orange-500/30 transition">
                Fetch
            </button>
        </form>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="space-y-3">
                <img src="https://placehold.co/600x400/png" alt="Thumbnail" class="w-full rounded-lg shadow-sm">
                <div class="flex justify-between items-center">
                    <span class="text-sm font-medium text-gray-500">Max Resolution (1280x720)</span>
                    <a href="#" class="text-sm bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 px-3 py-1.5 rounded-lg transition">Download</a>
                </div>
            </div>
            <div class="space-y-3">
                <img src="https://placehold.co/600x400/png" alt="Thumbnail" class="w-full rounded-lg shadow-sm">
                <div class="flex justify-between items-center">
                    <span class="text-sm font-medium text-gray-500">High Quality (640x480)</span>
                    <a href="#" class="text-sm bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 px-3 py-1.5 rounded-lg transition">Download</a>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
