<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(title='Tag Generator', content=~{::section})}">
<body>
<section class="max-w-4xl mx-auto">
    
    <div class="card-base p-8 md:p-10">
        <div class="mb-8 border-b border-gray-100 dark:border-gray-700 pb-6">
            <h2 class="text-2xl font-bold flex items-center gap-3 text-gray-900 dark:text-white">
                <div class="p-2 rounded-lg bg-brand-100 dark:bg-brand-900/50 text-brand-600 dark:text-brand-400">
                    <i class="ph-fill ph-hash text-2xl"></i>
                </div>
                YouTube SEO Tag Generator
            </h2>
            <p class="mt-2 text-gray-500 dark:text-gray-400 text-sm ml-12">Generate optimized tags to rank higher in search results.</p>
        </div>

        <form class="flex flex-col md:flex-row gap-4 mb-10">
            <div class="relative flex-1">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="ph ph-magnifying-glass text-gray-400 text-lg"></i>
                </div>
                <input type="text" placeholder="Paste YouTube Video URL or Enter Keyword..." 
                       class="input-field pl-11">
            </div>
            <button type="submit" class="btn-primary flex items-center justify-center gap-2">
                <i class="ph-bold ph-lightning"></i> Generate Tags
            </button>
        </form>

        <div class="bg-gray-50 dark:bg-gray-900/50 rounded-xl p-6 border border-gray-100 dark:border-gray-800">
            <div class="flex justify-between items-center mb-5">
                <h3 class="font-semibold text-gray-700 dark:text-gray-300 flex items-center gap-2">
                    <i class="ph-fill ph-check-circle text-green-500"></i> Generated Results
                </h3>
                <button class="text-sm text-brand-600 dark:text-brand-400 font-medium hover:text-brand-700 dark:hover:text-brand-300 flex items-center gap-1.5 px-3 py-1.5 rounded-lg hover:bg-brand-50 dark:hover:bg-brand-900/30 transition-colors">
                    <i class="ph-bold ph-copy"></i> Copy All
                </button>
            </div>
            
            <div class="flex flex-wrap gap-2.5">
                <span class="px-3 py-1.5 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 cursor-pointer hover:border-brand-300 dark:hover:border-brand-700 hover:text-brand-600 dark:hover:text-brand-400 transition-all select-none">
                    #SpringBoot
                </span>
                <span class="px-3 py-1.5 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 cursor-pointer hover:border-brand-300 dark:hover:border-brand-700 hover:text-brand-600 dark:hover:text-brand-400 transition-all select-none">
                    #WebDevelopment
                </span>
                <span class="px-3 py-1.5 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 cursor-pointer hover:border-brand-300 dark:hover:border-brand-700 hover:text-brand-600 dark:hover:text-brand-400 transition-all select-none">
                    #TailwindCSS
                </span>
                <span class="px-3 py-1.5 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-sm font-medium rounded-lg border border-gray-200 dark:border-gray-700 cursor-pointer hover:border-brand-300 dark:hover:border-brand-700 hover:text-brand-600 dark:hover:text-brand-400 transition-all select-none">
                    #JavaTutorial
                </span>
            </div>
        </div>
    </div>
</section>
</body>
</html>
