<!DOCTYPE html>
<html th:replace="~{fragments/layout :: layout(title='Tag Generator', content=~{::section})}">
<body>
<section class="max-w-4xl mx-auto">
    
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-8">
        <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
            <i class="ph-fill ph-hash text-brand-500"></i> YouTube SEO Tag Generator
        </h2>

        <form class="flex gap-4 mb-8">
            <input type="text" placeholder="Paste YouTube Video URL or Enter Keywords..." 
                   class="flex-1 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-xl px-5 py-3 focus:ring-2 focus:ring-brand-500 focus:outline-none transition">
            <button type="submit" class="bg-brand-600 hover:bg-brand-700 text-white font-medium px-8 py-3 rounded-xl shadow-lg shadow-brand-500/30 transition">
                Generate
            </button>
        </form>

        <div class="border-t border-gray-100 dark:border-gray-700 pt-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold text-gray-700 dark:text-gray-300">Generated Tags</h3>
                <button class="text-sm text-brand-600 hover:text-brand-700 font-medium flex items-center gap-1">
                    <i class="ph ph-copy"></i> Copy All
                </button>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <span class="px-3 py-1.5 bg-brand-50 dark:bg-brand-900/30 text-brand-700 dark:text-brand-300 text-sm rounded-full border border-brand-100 dark:border-brand-800 cursor-pointer hover:bg-brand-100 transition">
                    #Spring Boot
                </span>
                <span class="px-3 py-1.5 bg-brand-50 dark:bg-brand-900/30 text-brand-700 dark:text-brand-300 text-sm rounded-full border border-brand-100 dark:border-brand-800 cursor-pointer hover:bg-brand-100 transition">
                    #WebDevelopment
                </span>
                <span class="px-3 py-1.5 bg-brand-50 dark:bg-brand-900/30 text-brand-700 dark:text-brand-300 text-sm rounded-full border border-brand-100 dark:border-brand-800 cursor-pointer hover:bg-brand-100 transition">
                    #TailwindCSS
                </span>
                <span class="px-3 py-1.5 bg-brand-50 dark:bg-brand-900/30 text-brand-700 dark:text-brand-300 text-sm rounded-full border border-brand-100 dark:border-brand-800 cursor-pointer hover:bg-brand-100 transition">
                    #Java
                </span>
            </div>
        </div>
    </div>
</section>
</body>
</html>
