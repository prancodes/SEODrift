# Use dummy PostgreSQL variables since onRefresh prevents actual connections
spring.datasource.url=jdbc:postgresql://localhost:5432/dummy
spring.datasource.username=dummy
spring.datasource.password=dummy
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.initialization-fail-timeout=-1

# Set JPA to none so it doesn't attempt to execute SQL against the dummy database
spring.jpa.hibernate.ddl-auto=none

# Mock Redis to run locally/safely during build-time
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=dummy
spring.data.redis.ssl.enabled=false

# Safely mock dummy values for required external API placeholders 
spring.security.oauth2.client.registration.google.client-id=mock-id
spring.security.oauth2.client.registration.google.client-secret=mock-secret
youtube.api.key=mock-key
spring.ai.google.genai.api-key=mock-key
spring.ai.google.genai.chat.options.model=mock-model
