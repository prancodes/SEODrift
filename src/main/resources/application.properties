# ==========================================
# BASE APPLICATION CONFIGURATION
# ==========================================
# Profile-specific configs are in:
#   - application-dev.properties (development)
#   - application-prod.properties (production)

# Default active profile (can be overridden by environment variable)

# Application Name
spring.application.name=SEODrift
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# 1. Server Configuration
server.port=${PORT:8080}
server.servlet.session.timeout=6h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# 2. Database Configuration (Shared Neon.tech)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP (Optimized for Serverless)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# 3. JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# 4. Security & OAuth2 (Google Console)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile,openid,https://www.googleapis.com/auth/youtube.readonly,https://www.googleapis.com/auth/youtube.upload,https://www.googleapis.com/auth/yt-analytics.readonly

# 5. Application Properties (Custom)
youtube.api.key=${YT_API_KEY}
base.url=${BASE_URL:https://www.googleapis.com/youtube/v3}
app.base-url=${APP_URL:http://localhost:8080}
spring.cloud.gateway.server.webmvc.form-filter.enabled=false

# 6. Redis Caching Configuration
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED}

# 7. Global Defaults
spring.thymeleaf.cache=true
logging.level.root=INFO
