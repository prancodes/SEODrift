# ==========================================
# DEVELOPMENT PROFILE - Local Development
# ==========================================
# This file is loaded when SPRING_PROFILES_ACTIVE=dev

# Import .env file (works locally)
spring.config.import=optional:file:.env[.properties]

# Logging
# Inherits root=INFO from application.properties
logging.level.com.seo.project=DEBUG
logging.level.org.springframework.web=DEBUG

# Thymeleaf - Disable caching for development
spring.thymeleaf.cache=false

# Dev Tools - Enable hot reload
spring.devtools.restart.enabled=true

# JPA Override (Shared NeonDB Update)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Security (Non-HTTPS environment)
server.servlet.session.cookie.secure=false

# Tomcat Debugging Timeouts
server.tomcat.connection-timeout=300000