# ==========================================
# DEVELOPMENT PROFILE - Local Development
# ==========================================
# This file is loaded when SPRING_PROFILES_ACTIVE=dev

# Import .env file (works locally)
spring.config.import=optional:file:.env[.properties]

# Logging
logging.level.root=INFO
logging.level.com.seo.project=DEBUG
logging.level.org.springframework.web=DEBUG

# Thymeleaf - Disable caching for development
spring.thymeleaf.cache=false

# Dev Tools - Enable hot reload
spring.devtools.restart.enabled=true

# ✅ Increased timeouts for development/debugging
server.tomcat.connection-timeout=300000
server.tomcat.max-http-form-post-size=1073741824