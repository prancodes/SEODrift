services:
  seodrift:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seodrift_app
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - YT_API_KEY=${YT_API_KEY:-your-api-key-here}
      - BASE_URL=${BASE_URL:-www.googleapis.com}
      - PORT=8080
    networks:
      - seodrift-network
    # Healthcheck (optional but recommended)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  seodrift-network:
    driver: bridge